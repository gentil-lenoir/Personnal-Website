    <!-- 🛡️ Script de protection Google Translate optimisé -->
    <script>
      // Version ultra-simplifiée pour éviter les conflits avec React
      function hideGoogleTranslateElements() {
        try {
          const elements = document.querySelectorAll(
            '.goog-te-banner-frame, .goog-te-banner, [class*="goog-te"]'
          );
          elements.forEach(el => {
            el.style.display = 'none';
            el.style.visibility = 'hidden';
          });
        } catch (e) {
          // Silencieux pour éviter les erreurs console
        }
      }

      // Masquer une seule fois au chargement
      hideGoogleTranslateElements();

      // Exposer la fonction pour React
      window.hideGoogleTranslateElements = hideGoogleTranslateElements;
    </script>
